<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2a2540;
    --rose:#fb7185;
    --amber:#f59e0b;
    --sky:#38bdf8;
    --emerald:#34d399;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  body{
    font-family:'Sarabun',sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,#fde9ef 0%,#f3e8ff 45%,#e0f2fe 100%);
    min-height:100dvh;
    overflow-x:hidden;
  }
  h1,h2,h3,.font-display{ font-family:'Prompt',sans-serif; }

  /* ป้องกัน select ตัวอักษรระหว่างเล่น */
  .noselect{ user-select:none; -webkit-user-select:none; }

  /* การ์ดเด้งเข้า */
  @keyframes cardIn{
    0%{ opacity:0; transform:translateY(28px) scale(.94) rotate(-1.5deg); }
    100%{ opacity:1; transform:translateY(0) scale(1) rotate(0); }
  }
  .card-in{ animation:cardIn .5s cubic-bezier(.22,1,.36,1) both; }

  @keyframes pop{
    0%{ transform:scale(.6); opacity:0; }
    60%{ transform:scale(1.06); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }
  .pop{ animation:pop .35s cubic-bezier(.22,1,.36,1) both; }

  /* ตัวเลขเด้งลอยขึ้นตอนค่าเปลี่ยน */
  @keyframes floatUp{
    0%{ opacity:0; transform:translateY(6px) scale(.8); }
    20%{ opacity:1; transform:translateY(-2px) scale(1); }
    100%{ opacity:0; transform:translateY(-26px) scale(1); }
  }
  .float-up{ animation:floatUp 1.1s ease-out forwards; }

  /* แถบค่าทักษะ */
  .stat-bar{ transition:width .7s cubic-bezier(.22,1,.36,1); }

  /* ปุ่มทางเลือก */
  .choice{ transition:transform .15s ease, box-shadow .2s ease, background .2s ease; }
  .choice:active{ transform:scale(.97); }

  @keyframes glow{
    0%,100%{ box-shadow:0 10px 30px -8px rgba(251,113,133,.45); }
    50%{ box-shadow:0 14px 38px -6px rgba(168,85,247,.55); }
  }
  .glow{ animation:glow 2.6s ease-in-out infinite; }

  @keyframes floaty{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }
  .floaty{ animation:floaty 3.4s ease-in-out infinite; }

  /* ดอท progress */
  .dot{ transition:all .35s ease; }

  /* confetti */
  .confetti{ position:absolute; top:-12px; width:9px; height:14px; border-radius:2px; will-change:transform; }
  @keyframes fall{
    0%{ transform:translateY(-20px) rotate(0); opacity:1; }
    100%{ transform:translateY(105dvh) rotate(540deg); opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
  ::-webkit-scrollbar{ width:0; }

/* ============================================================
   สถานะเกม + ตัวช่วย
   ============================================================ */
let state = { idx:0, stats:{happy:5,resp:5,friend:5,goal:5}, picked:null };
const MAXV = 14; // เพดานสำหรับวาดแถบ (เริ่ม 5 + สูงสุดที่เป็นไปได้)
const app = document.getElementById('app');

function resetGame(){
  state = { idx:0, stats:{happy:5,resp:5,friend:5,goal:5}, picked:null };
}

function clampStats(){
  for(const k in state.stats){
    state.stats[k] = Math.max(0, Math.min(MAXV, state.stats[k]));
  }
}

function dominantEnding(){
  const s = state.stats;
  const vals = Object.values(s);
  const max = Math.max(...vals), min = Math.min(...vals);
  // ถ้าทุกค่าสูงและต่างกันน้อย = สมดุล
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  if(max - min <= 3 && avg >= 7) return ENDINGS.balanced;
  // หาค่าที่เด่นที่สุด
  let topKey='happy', topVal=-1;
  for(const k in s){ if(s[k]>topVal){ topVal=s[k]; topKey=k; } }
  return ENDINGS[topKey] || ENDINGS.balanced;
}

        <button onclick="pick(${i})" class="choice w-full text-left bg-white rounded-2xl px-4 py-3.5 shadow-md shadow-slate-200/60 active:bg-violet-50 flex items-center gap-3">
          <span class="shrink-0 w-7 h-7 rounded-full bg-violet-100 text-violet-600 font-bold text-sm grid place-items-center">${String.fromCharCode(65+i)}</span>
          <span class="text-[15px] font-medium text-slate-700 leading-snug">${ch.t}</span>
        </button>`).join('')}
    </div>

    <div class="mt-4 bg-white/50 rounded-2xl p-3.5">
      ${statBars(false)}
    </div>
  `;
}

function pick(i){
  if(state.picked!==null) return;
  state.picked = i;
  const c = CARDS[state.idx];
  const ch = c.choices[i];

  // ปิดปุ่มทางเลือก + ไฮไลต์ที่เลือก
  const choiceBtns = document.querySelectorAll('#choices button');
  choiceBtns.forEach((b,idx)=>{
    b.disabled = true;
    b.classList.add('pointer-events-none');
    if(idx===i){ b.classList.add('ring-2','ring-violet-400','bg-violet-50'); }
    else{ b.classList.add('opacity-40'); }
  });

  // อัปเดตค่า + แอนิเมชันแถบ
  const prev = {...state.stats};
  for(const k in ch.fx){ state.stats[k] += ch.fx[k]; }
  clampStats();

  for(const k in STATS){
    const bar = document.getElementById('bar-'+k);
    const num = document.getElementById('num-'+k);
    if(bar) bar.style.width = Math.round((state.stats[k]/MAXV)*100)+'%';
    if(num) num.textContent = state.stats[k];
    // ป้ายลอย +/- ถ้ามีการเปลี่ยน
    const d = (state.stats[k]-prev[k]);
    if(d!==0 && num){
      const tag = document.createElement('span');
      tag.textContent = (d>0?'+':'') + d;
      tag.className = 'float-up absolute ml-1 text-xs font-bold';
      tag.style.color = d>0 ? STATS[k].bg : '#94a3b8';
      num.parentElement.style.position='relative';
      num.parentElement.appendChild(tag);
      setTimeout(()=>tag.remove(),1100);
    }
  }

  // แสดงผลที่ตามมา
  const choicesBox = document.getElementById('choices');
  const result = document.createElement('div');
  result.className = 'pop bg-gradient-to-br from-violet-50 to-rose-50 border border-violet-100 rounded-2xl p-4 mt-1';
  result.innerHTML = `
    <p class="text-xs font-bold text-violet-500 mb-1.5">✦ สิ่งที่ตามมา</p>
    <p class="text-[15px] text-slate-700 leading-relaxed mb-4">${ch.r}</p>
    <button onclick="next()" class="w-full bg-gradient-to-r from-violet-500 to-rose-400 text-white font-bold font-display py-3 rounded-xl active:scale-95 transition">
      ${state.idx < CARDS.length-1 ? 'ไปต่อ →' : 'ดูผลของเธอ ✨'}
    </button>`;
  choicesBox.appendChild(result);
  result.scrollIntoView({behavior:'smooth', block:'center'});
}

function next(){
  if(state.idx < CARDS.length-1){
    state.idx++;
    renderCard();
    window.scrollTo({top:0, behavior:'smooth'});
  }else{
    renderResult();
  }
}

function renderResult(){
  const end = dominantEnding();
  app.innerHTML = `
    <div class="flex-1 flex flex-col items-center justify-center text-center card-in py-6">
      <div class="floaty text-7xl mb-3 pop">${end.emoji}</div>
      <p class="text-sm font-semibold tracking-widest text-violet-500 mb-1">บุคลิกนักตัดสินใจของเธอคือ</p>
      <h1 class="text-3xl font-extrabold mb-4" style="background:linear-gradient(120deg,#fb7185,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;">${end.title}</h1>
      <p class="text-[15px] text-slate-600 leading-relaxed mb-7 px-1">${end.desc}</p>

      <div class="w-full bg-white rounded-3xl p-5 shadow-xl shadow-violet-200/50 mb-6">
        <p class="text-xs font-bold text-slate-400 mb-3 text-left">สรุปค่าทักษะของเธอ</p>
        ${statBars(true)}
      </div>

      <div class="w-full bg-violet-50 rounded-2xl p-4 mb-7">
        <p class="text-sm text-violet-800 leading-relaxed">
          💡 <b>ข้อคิดส่งท้าย</b><br>
          ในชีวิตจริงไม่มีตัวเลือกที่ "ถูกทั้งหมด" ทุกการตัดสินใจคือการแลกเปลี่ยน
          คนที่ตัดสินใจเก่ง ไม่ใช่คนที่ไม่เคยพลาด แต่คือคนที่<b>คิดถึงผลที่ตามมา</b>
          และ<b>รับผิดชอบสิ่งที่เลือก</b>ได้
        </p>
      </div>

      <button onclick="renderStart()" class="w-full bg-gradient-to-r from-rose-400 to-violet-500 text-white text-lg font-bold font-display py-4 rounded-2xl shadow-lg active:scale-95 transition mb-2">
        เล่นอีกครั้ง ↻
      </button>
      <button onclick="shareGame()" class="text-sm text-violet-500 font-medium py-2">แชร์ให้เพื่อนลองเล่น</button>
    </div>
  `;
  // วาดแถบหลังเฟรมถัดไปเพื่อให้ animation เด้ง
  requestAnimationFrame(()=>{
    Object.keys(STATS).forEach(k=>{
      const bar=document.getElementById('bar-'+k);
      if(bar) bar.style.width = Math.round((state.stats[k]/MAXV)*100)+'%';
    });
  });
  confetti();
}

function confetti(){
  const colors=['#fb7185','#f59e0b','#38bdf8','#34d399','#a855f7'];
  for(let i=0;i<26;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[i%colors.length];
    c.style.animation=`fall ${2.2+Math.random()*1.6}s ${Math.random()*0.6}s ease-in forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

function confirmRestart(){
  if(confirm('เริ่มเล่นใหม่ตั้งแต่ต้น? ค่าทักษะปัจจุบันจะหายไปนะ')){
    renderStart();
  }
}

function shareGame(){
  const txt='ลองเล่นเกม "เลือกได้" — เกมการ์ดเส้นทางชีวิต ม.6 ดูสิ ว่าเธอเป็นนักตัดสินใจแบบไหน!';
  if(navigator.share){
    navigator.share({title:'เลือกได้', text:txt, url:location.href}).catch(()=>{});
  }else{
    navigator.clipboard?.writeText(location.href).then(
      ()=>alert('คัดลอกลิงก์แล้ว! ส่งให้เพื่อนได้เลย'),
      ()=>alert('แชร์ลิงก์หน้านี้ให้เพื่อนได้เลย')
    );
  }
}

/* เริ่มต้น */
renderStart();
</script>
</body>
</html>
