<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เส้นทางที่เลือกเอง — เกมตัดสินใจเส้นทางชีวิต</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0F2018; --bg-panel:#1B3328; --bg-panel-2:#20402F;
  --gold:#D4A24C; --gold-soft:#EACB8B; --teal:#6FA98C;
  --parchment:#EFE9DD; --parchment-dim:#C9C2AE;
  --rust:#B5502E; --ink:#081209; --line:rgba(239,233,221,0.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1100px 700px at 15% -10%,rgba(111,169,140,.16),transparent 60%),
    radial-gradient(900px 600px at 100% 110%,rgba(212,162,76,.10),transparent 55%),
    var(--bg-deep);
  color:var(--parchment); font-family:'Mitr',sans-serif;
  min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
  padding:32px 18px 60px;
}
.contour{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;}
.app{position:relative;z-index:1;width:100%;max-width:900px;}
h1,h2,h3{font-family:'Taviraj',serif;font-weight:600;margin:0;}

/* Brand */
.brand{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.brand .mark{width:40px;height:40px;border-radius:50%;background:conic-gradient(from 210deg,var(--gold),var(--teal),var(--gold));display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px var(--bg-panel),0 0 0 4px var(--line);flex-shrink:0;}
.brand .mark::after{content:"◆";color:var(--ink);font-size:14px;}
.brand .titles .kicker{font-size:12px;letter-spacing:.14em;color:var(--gold-soft);text-transform:uppercase;}
.brand .titles .name{font-size:19px;}
.brand .fs-btn{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--parchment-dim);border-radius:8px;padding:6px 12px;font-family:'Mitr',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.brand .fs-btn:hover{border-color:var(--gold);color:var(--gold);}

/* Progress bar */
.progress-wrap{margin-bottom:18px;}
.progress-top{display:flex;justify-content:space-between;font-size:12px;color:var(--parchment-dim);margin-bottom:6px;}
.progress-top .pct{color:var(--gold-soft);font-weight:500;}
.progress-bg{height:5px;border-radius:100px;background:rgba(239,233,221,.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--teal),var(--gold));width:0%;transition:width .6s cubic-bezier(.2,.8,.2,1);}

/* Trail dots */
.trail{display:flex;align-items:center;gap:5px;margin:0 0 22px;overflow-x:auto;padding-bottom:4px;}
.trail .dot{width:9px;height:9px;border-radius:50%;background:var(--bg-panel-2);border:1.5px solid var(--line);flex-shrink:0;transition:all .4s ease;}
.trail .dot.done{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(212,162,76,.6);}
.trail .dot.current{background:var(--teal);border-color:var(--teal);transform:scale(1.35);}
.trail .seg{flex:1;height:2px;background:var(--line);min-width:10px;}
.trail .seg.done{background:var(--gold);}

/* Card + fade */
.card-wrap{position:relative;}
.card{
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-panel-2));
  border:1px solid var(--line);border-radius:18px;
  padding:34px clamp(20px,4vw,46px);
  box-shadow:0 30px 60px -20px rgba(0,0,0,.55);
  position:relative;overflow:hidden;
  opacity:1;transform:translateY(0);
  transition:opacity .28s ease,transform .28s ease;
}
.card.fade-out{opacity:0;transform:translateY(10px);}
.card.fade-in{animation:fadeIn .32s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.card::before{content:"";position:absolute;top:-40%;right:-15%;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(212,162,76,.10),transparent 65%);pointer-events:none;}

.eyebrow{font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:10px;display:block;}
.scene-title{font-size:clamp(22px,3.4vw,30px);line-height:1.35;margin-bottom:16px;color:var(--parchment);}
.scene-text{font-size:16px;line-height:1.9;color:var(--parchment-dim);margin-bottom:10px;white-space:pre-line;}
.scene-block{margin-bottom:26px;}

/* Choices */
.choices{display:flex;flex-direction:column;gap:12px;}
.choice{
  text-align:left;background:rgba(239,233,221,.03);border:1px solid var(--line);border-radius:12px;
  padding:16px 18px;color:var(--parchment);font-family:'Mitr',sans-serif;cursor:pointer;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color .2s,background .2s,transform .15s;
}
.choice:hover{border-color:var(--gold);background:rgba(212,162,76,.08);transform:translateX(3px);}
.choice:active{transform:translateX(1px) scale(.995);}
.choice .tag{flex-shrink:0;margin-top:2px;width:22px;height:22px;border-radius:6px;background:var(--bg-deep);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Taviraj',serif;font-size:12px;color:var(--gold-soft);}
.choice .body .clabel{font-size:15px;line-height:1.6;display:block;}
.choice .body .csub{font-size:13px;line-height:1.6;color:var(--parchment-dim);margin-top:4px;display:block;}

/* Buttons */
.startbtn,.restartbtn,.continuebtn,.pdfbtn,.submitbtn{
  margin-top:8px;background:var(--gold);color:var(--ink);border:none;border-radius:12px;
  padding:14px 24px;font-family:'Mitr',sans-serif;font-weight:500;font-size:15px;cursor:pointer;
  box-shadow:0 10px 24px -10px rgba(212,162,76,.55);
  transition:transform .15s,box-shadow .15s;
}
.startbtn:hover,.restartbtn:hover,.pdfbtn:hover,.submitbtn:hover{transform:translateY(-2px);box-shadow:0 14px 28px -10px rgba(212,162,76,.7);}
.continuebtn{background:transparent;color:var(--teal);border:1px solid rgba(111,169,140,.4);box-shadow:none;}
.continuebtn:hover{background:rgba(111,169,140,.1);transform:translateY(-1px);}
.pdfbtn{background:rgba(239,233,221,.08);color:var(--parchment);border:1px solid var(--line);box-shadow:none;margin-left:8px;}
.pdfbtn:hover{border-color:var(--gold);color:var(--gold);}
.submitbtn{background:var(--teal);color:var(--ink);}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;align-items:center;}

/* Intro list */
.intro-list{list-style:none;padding:0;margin:22px 0 30px;display:grid;gap:10px;}
.intro-list li{display:flex;gap:10px;align-items:flex-start;color:var(--parchment-dim);font-size:14.5px;line-height:1.7;}
.intro-list li::before{content:"—";color:var(--gold);flex-shrink:0;}

/* Pre/Post survey */
.survey-wrap{margin:20px 0 28px;display:grid;gap:18px;}
.survey-q{font-size:14.5px;color:var(--parchment);line-height:1.7;margin-bottom:8px;}
.likert{display:flex;gap:6px;flex-wrap:wrap;}
.likert label{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.likert input[type=radio]{display:none;}
.likert .lbtn{
  width:38px;height:38px;border-radius:9px;border:1.5px solid var(--line);
  background:rgba(239,233,221,.03);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--parchment-dim);transition:all .15s;
}
.likert input:checked+.lbtn{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600;}
.likert label:hover .lbtn{border-color:var(--gold);color:var(--gold);}
.likert-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--parchment-dim);margin-top:4px;}

/* Checkpoint */
.checkpoint-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(111,169,140,.1);border:1px solid rgba(111,169,140,.3);color:var(--teal);padding:6px 14px;border-radius:100px;font-size:12.5px;letter-spacing:.06em;margin-bottom:16px;}
.mirror{background:rgba(212,162,76,.06);border:1px dashed rgba(212,162,76,.35);border-radius:14px;padding:16px 20px;margin:18px 0 26px;font-size:14.5px;color:var(--gold-soft);line-height:1.8;}

/* Results */
.result-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(212,162,76,.12);border:1px solid rgba(212,162,76,.4);color:var(--gold-soft);padding:6px 14px;border-radius:100px;font-size:12.5px;letter-spacing:.08em;margin-bottom:16px;}
.tagline{font-size:15px;color:var(--teal);margin-bottom:18px;}
.subhead{font-family:'Taviraj',serif;font-size:15.5px;color:var(--gold-soft);margin:26px 0 12px;}

.career-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
.career-tags span{font-size:13px;padding:6px 12px;border-radius:100px;background:rgba(239,233,221,.05);border:1px solid var(--line);color:var(--parchment-dim);}

.watchout{font-size:14.5px;line-height:1.85;color:var(--parchment-dim);background:rgba(181,80,46,.08);border:1px solid rgba(181,80,46,.3);border-radius:12px;padding:14px 18px;margin-bottom:22px;}

/* Recap */
.recap{margin:22px 0;display:grid;gap:2px;}
.recap-item{font-size:13.5px;color:var(--parchment-dim);line-height:1.7;padding:16px 18px 16px 20px;border-left:2px solid var(--line);transition:border-color .2s;}
.recap-item:hover{border-left-color:var(--gold);}
.recap-item .rstep{color:var(--gold-soft);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.recap-item .rchoice{color:var(--parchment);font-size:14.5px;font-weight:500;line-height:1.6;margin-bottom:4px;}
.recap-item .rsub{color:var(--parchment-dim);font-size:13px;line-height:1.65;margin-bottom:6px;font-style:italic;}
.recap-item .rtrait{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 9px;border-radius:100px;background:rgba(111,169,140,.1);border:1px solid rgba(111,169,140,.25);color:var(--teal);}

/* Traits bar */
.traits{display:grid;gap:14px;margin:22px 0 30px;}
.trait-row{display:grid;grid-template-columns:110px 1fr 34px;align-items:center;gap:12px;}
.trait-label{font-size:13.5px;color:var(--parchment-dim);}
.trait-bar-bg{height:8px;border-radius:100px;background:rgba(239,233,221,.08);overflow:hidden;}
.trait-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--teal),var(--gold));width:0%;transition:width 1s cubic-bezier(.2,.8,.2,1);}
.trait-val{font-size:12.5px;color:var(--gold-soft);text-align:right;}

/* Transparency box */
.transparency{background:rgba(239,233,221,.03);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:22px;}
.transparency summary{cursor:pointer;font-size:14px;color:var(--gold-soft);list-style:none;display:flex;align-items:center;gap:8px;outline:none;}
.transparency summary::before{content:"▶";font-size:10px;transition:transform .2s;}
.transparency[open] summary::before{transform:rotate(90deg);}
.transparency .t-body{margin-top:14px;font-size:13.5px;color:var(--parchment-dim);line-height:1.85;}
.transparency .t-row{display:flex;gap:10px;margin-bottom:8px;align-items:baseline;}
.transparency .t-k{flex-shrink:0;color:var(--parchment);font-weight:500;min-width:80px;}

/* Next steps */
.nextsteps{display:grid;gap:12px;margin-bottom:22px;}
.nstep{background:rgba(239,233,221,.03);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.nstep .icon{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:rgba(212,162,76,.1);border:1px solid rgba(212,162,76,.25);display:flex;align-items:center;justify-content:center;font-size:14px;}
.nstep .ncontent .ntitle{font-size:13.5px;color:var(--parchment);font-weight:500;margin-bottom:3px;}
.nstep .ncontent .ndesc{font-size:13px;color:var(--parchment-dim);line-height:1.65;}

/* Challenge */
.challenge{background:rgba(212,162,76,.07);border:1px solid rgba(212,162,76,.3);border-radius:14px;padding:18px 20px;margin-bottom:18px;font-size:14.5px;color:var(--parchment);line-height:1.85;}
.challenge b{color:var(--gold-soft);}

/* Reflect */
.reflect{background:rgba(111,169,140,.08);border:1px solid rgba(111,169,140,.25);border-radius:14px;padding:20px 22px;margin-top:6px;}
.reflect h3{font-size:15.5px;color:var(--teal);margin-bottom:16px;}
.reflect-item{margin-bottom:18px;}
.reflect-item:last-child{margin-bottom:0;}
.reflect-q{font-size:14.5px;color:var(--parchment-dim);line-height:1.85;margin-bottom:8px;}
.reflect-q .qnum{color:var(--teal);margin-right:6px;font-weight:500;}
.reflect-ans{background:rgba(239,233,221,.04);border:1px solid var(--line);border-radius:10px;padding:11px 14px 11px 22px;font-size:13.5px;color:var(--parchment);line-height:1.7;font-style:italic;position:relative;}
.reflect-ans::before{content:"\201C";position:absolute;top:-2px;left:8px;font-size:26px;color:var(--gold-soft);opacity:.4;font-family:'Taviraj',serif;line-height:1;}
.reflect-ans-label{font-size:11px;color:var(--gold-soft);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;opacity:.7;font-style:normal;}

/* GAS submit */
.gas-form{background:rgba(111,169,140,.06);border:1px solid rgba(111,169,140,.2);border-radius:14px;padding:18px 20px;margin-bottom:18px;}
.gas-form .gas-title{font-size:14px;color:var(--teal);margin-bottom:10px;}
.gas-form .gas-note{font-size:12.5px;color:var(--parchment-dim);line-height:1.7;margin-bottom:12px;}
.gas-input{width:100%;background:rgba(239,233,221,.04);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--parchment);font-family:'Mitr',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:10px;}
.gas-input:focus{border-color:var(--teal);}
.gas-status{font-size:13px;margin-top:6px;min-height:20px;color:var(--teal);}

/* Post survey comparison */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0 22px;}
.compare-box{background:rgba(239,233,221,.03);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
.compare-box .cblabel{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.compare-box.pre .cblabel{color:var(--parchment-dim);}
.compare-box.post .cblabel{color:var(--gold-soft);}
.compare-bar-wrap{display:grid;gap:7px;}
.compare-bar-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.compare-bar-row .cblabel2{width:90px;color:var(--parchment-dim);flex-shrink:0;}
.compare-bar-mini-bg{flex:1;height:6px;border-radius:100px;background:rgba(239,233,221,.08);overflow:hidden;}
.compare-bar-mini-fill{height:100%;border-radius:100px;}
.compare-bar-mini-fill.pre-fill{background:var(--parchment-dim);}
.compare-bar-mini-fill.post-fill{background:var(--gold);}
.compare-bar-row .cbval{width:20px;text-align:right;color:var(--parchment-dim);font-size:11px;}

footer{text-align:center;margin-top:26px;color:rgba(239,233,221,.35);font-size:12px;}

@media(max-width:520px){
  .card{padding:26px 18px;}
  .trait-row{grid-template-columns:88px 1fr 30px;}
  .compare-grid{grid-template-columns:1fr;}
}
/* ===== PRINT / PDF ===== */
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{
    background:#F7F5F0!important;
    color:#1A1A1A!important;
    font-family:'Mitr',sans-serif!important;
    padding:0!important; margin:0!important;
    display:block!important;
  }
  .contour,.trail,.progress-wrap,.brand .fs-btn,
  .btn-row,.gas-form,.choices,.startbtn,.restartbtn,
  .continuebtn,.reflect,.challenge,.transparency{
    display:none!important;
  }
  .app{max-width:100%!important;padding:0!important;}
  .brand{
    background:#1B3328!important;color:#EFE9DD!important;
    padding:14px 24px!important;margin-bottom:0!important;
    border-radius:0!important;
  }
  .brand .mark{display:none!important;}
  .brand .titles .kicker{color:#EACB8B!important;font-size:10pt!important;}
  .brand .titles .name{color:#EFE9DD!important;font-size:16pt!important;}
  .card-wrap{margin-top:0!important;}
  .card{
    background:#FFFFFF!important;
    border:none!important;border-radius:0!important;
    box-shadow:none!important;
    padding:24px 32px!important;
    overflow:visible!important;
  }
  .card::before{display:none!important;}
  /* Result badge → colored label */
  .result-badge{
    background:#E8F5EE!important;border:1px solid #6FA98C!important;
    color:#1B5E3A!important;border-radius:6px!important;
    font-size:9pt!important;padding:4px 10px!important;
  }
  .scene-title{color:#0F2018!important;font-size:18pt!important;}
  .tagline{color:#2E7D56!important;font-size:11pt!important;margin-bottom:14px!important;}
  .scene-text{color:#333!important;font-size:11pt!important;line-height:1.85!important;}
  .subhead{
    color:#1B5E3A!important;font-size:12pt!important;
    border-bottom:1.5px solid #6FA98C!important;
    padding-bottom:4px!important;margin:20px 0 10px!important;
  }
  /* Career tags */
  .career-tags span{
    background:#F0FBF5!important;border:1px solid #6FA98C!important;
    color:#1B5E3A!important;font-size:9.5pt!important;
    border-radius:100px!important;padding:3px 10px!important;
  }
  /* Watchout */
  .watchout{
    background:#FFF8F0!important;border:1px solid #D4A24C!important;
    border-radius:8px!important;color:#5C3A00!important;
    font-size:10.5pt!important;padding:12px 16px!important;
  }
  /* Next steps */
  .nstep{
    background:#F7FBF9!important;border:1px solid #D0E8DC!important;
    border-radius:8px!important;padding:10px 14px!important;
    page-break-inside:avoid!important;
  }
  .nstep .icon{background:#E0F2EA!important;border:none!important;font-size:13pt!important;}
  .ntitle{color:#0F2018!important;font-size:11pt!important;}
  .ndesc{color:#444!important;font-size:10pt!important;}
  /* Recap */
  .recap-item{
    border-left:3px solid #6FA98C!important;
    padding:10px 12px!important;margin-bottom:4px!important;
    page-break-inside:avoid!important;
    background:#FAFFF9!important;
  }
  .recap-item .rstep{color:#888!important;font-size:9pt!important;}
  .recap-item .rchoice{color:#0F2018!important;font-size:11pt!important;}
  .recap-item .rsub{color:#555!important;font-size:10pt!important;}
  .recap-item .rtrait{
    background:#E8F5EE!important;border:1px solid #6FA98C!important;
    color:#1B5E3A!important;font-size:9pt!important;
    border-radius:100px!important;padding:2px 8px!important;
    display:inline-block!important;
  }
  /* Trait bars */
  .trait-row{grid-template-columns:120px 1fr 40px!important;}
  .trait-label{color:#333!important;font-size:10.5pt!important;}
  .trait-bar-bg{background:#E0E0E0!important;}
  .trait-bar-fill{background:#6FA98C!important;}
  .trait-val{color:#1B5E3A!important;}
  /* Compare */
  .compare-grid{grid-template-columns:1fr 1fr!important;}
  .compare-box{background:#FAFAFA!important;border:1px solid #DDD!important;border-radius:8px!important;}
  .compare-box.pre .cblabel{color:#888!important;}
  .compare-box.post .cblabel{color:#B5860E!important;}
  .compare-bar-mini-bg{background:#E0E0E0!important;}
  .compare-bar-mini-fill.pre-fill{background:#AAA!important;}
  .compare-bar-mini-fill.post-fill{background:#D4A24C!important;}
  /* Transparency — hide on print */
  .transparency{display:none!important;}
  /* Print footer */
  .print-footer{
    display:block!important;
    margin-top:24px!important;
    padding-top:12px!important;
    border-top:1px solid #CCC!important;
    font-size:9pt!important;color:#999!important;
    text-align:center!important;
  }
  /* Page breaks */
  .subhead{page-break-after:avoid!important;}
  .recap,.nextsteps,.traits{page-break-inside:avoid!important;}
}
</style>
</head>
<body>

<svg class="contour" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <path d="M-50,650 C200,600 350,700 600,640 C850,580 950,680 1250,600" stroke="#6FA98C" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M-50,700 C220,660 380,740 620,690 C860,640 980,720 1250,660" stroke="#6FA98C" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M-50,120 C250,60 420,160 700,100 C900,60 1000,140 1250,90" stroke="#D4A24C" stroke-width="1" fill="none" opacity="0.25"/>
</svg>

<div class="app">
  <div class="brand">
    <div class="mark"></div>
    <div class="titles">

/* ===================== FULLSCREEN ===================== */
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fsBtn').textContent = '✕ ออกจากเต็มจอ';
  } else {
    document.exitFullscreen();
    document.getElementById('fsBtn').textContent = '⛶ เต็มจอ';
  }
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement) document.getElementById('fsBtn').textContent='⛶ เต็มจอ';
});

/* ===================== PROGRESS ===================== */
function updateProgress(){
  var choiceNodes = ["n1","n2","n3","n4","n5","n6"];
  var doneCount = path.length;
  var total = choiceNodes.length;
  var pct = Math.round(doneCount/total*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
  var stepNum = Math.min(doneCount+1, total);
  document.getElementById('progressLabel').textContent =
    current==='end' ? 'เสร็จสิ้น' : `ทางแยกที่ ${stepNum} จาก ${total}`;
}

/* ===================== TRAIL ===================== */
function renderTrail(){
  var bar = document.getElementById('trailBar');
  bar.innerHTML='';
  var idx = NODE_ORDER.indexOf(current);
  NODE_ORDER.forEach((key,i)=>{
    var dot = document.createElement('div');
    dot.className='dot'+(i<idx?' done':i===idx?' current':'');
    bar.appendChild(dot);
    if(i<NODE_ORDER.length-1){
      var seg=document.createElement('div');
      seg.className='seg'+(i<idx?' done':'');
      bar.appendChild(seg);
    }
  });
}

/* ===================== TRANSITIONS ===================== */
function transitionTo(renderFn){
  var card = document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(()=>{
    renderFn();
    card.classList.remove('fade-out');
    card.classList.add('fade-in');
    setTimeout(()=>card.classList.remove('fade-in'),400);
    card.scrollIntoView({behavior:'smooth',block:'start'});
  },280);
}

/* ===================== SURVEY RENDER ===================== */
function surveyHTML(prefix, btnLabel, btnFn){
  return `
    <div class="survey-wrap">
      ${PRE_POST_QUESTIONS.map((q,i)=>`
        <div>
          <div class="survey-q">${i+1}. ${q}</div>
          <div class="likert">
            ${[1,2,3,4,5].map(v=>`
              <label>
                <input type="radio" name="${prefix}_q${i}" value="${v}">
                <div class="lbtn">${v}</div>
              </label>
            `).join('')}
          </div>
          <div class="likert-labels"><span>ไม่เห็นด้วยเลย</span><span>เห็นด้วยอย่างยิ่ง</span></div>
        </div>
      `).join('')}
    </div>
    <button class="startbtn" onclick="${btnFn}()">${btnLabel}</button>
  `;
}

function collectSurvey(prefix){
  var out = {};
  PRE_POST_QUESTIONS.forEach((_,i)=>{
    var r = document.querySelector(`input[name="${prefix}_q${i}"]:checked`);
    out[`q${i}`] = r ? parseInt(r.value) : null;
  });
  return out;
}

function submitPreSurvey(){
  preScores = collectSurvey('pre');
  var unanswered = Object.values(preScores).filter(v=>v===null).length;
  if(unanswered>0){

function choose(fromKey,trait,next,titleEnc,labelEnc,subEnc){
  scores[trait]+=1;
  path.push({
    stepTitle:decodeURIComponent(titleEnc),
    choiceLabel:decodeURIComponent(labelEnc),
    choiceSub:decodeURIComponent(subEnc||''),
    trait
  });
  if(next==='checkpoint') transitionTo(renderCheckpoint);
  else if(next==='end') transitionTo(renderPostSurvey);
  else transitionTo(()=>renderNode(next));
}

function submitPostSurvey(){
  postScores = collectSurvey('post');

  transitionTo(renderEnd);
}

/* ===================== COMPUTE ===================== */
function computeEnding(){
  var keys=["s","a","c","h"];
  var maxScore=Math.max(...keys.map(k=>scores[k]));
  var minScore=Math.min(...keys.map(k=>scores[k]));
  if(maxScore-minScore<=1) return "balanced";
  var order=keys.slice().sort((a,b)=>scores[b]-scores[a]);
  var top=order[0],second=order[1];
  var pairKey=[top,second].sort().join('');
  if(scores[top]-scores[second]<=1 && endings[pairKey]) return pairKey;
  return top;
}

function buildCompareHTML(){
  if(!preScores && !postScores) return '';
  var labels=["รู้ชัดถึงคุณค่า","มั่นใจในทิศทาง","อธิบายให้คนอื่นเข้าใจ","เปิดรับมุมมองใหม่"];
  var preRows='', postRows='';
  for(var i=0;i<labels.length;i++){
    var l=labels[i];
    var pv=(preScores&&preScores['q'+i])||0;
    preRows+='<div class="compare-bar-row"><div class="cblabel2">'+l+'</div><div class="compare-bar-mini-bg"><div class="compare-bar-mini-fill pre-fill" style="width:0%" data-w="'+(pv/5*100)+'"></div></div><div class="cbval">'+(pv||'—')+'</div></div>';
    var sv=(postScores&&postScores['q'+i])||0;
    var sprev=(preScores&&preScores['q'+i])||0;
    var sdiff=sv-sprev;
    var sarrow=sdiff>0?' ▲+'+sdiff:sdiff<0?' ▼'+sdiff:'';
    postRows+='<div class="compare-bar-row"><div class="cblabel2">'+l+'</div><div class="compare-bar-mini-bg"><div class="compare-bar-mini-fill post-fill" style="width:0%" data-w="'+(sv/5*100)+'"></div></div><div class="cbval">'+(sv||'—')+sarrow+'</div></div>';
  }
  return '<div class="subhead">การเปลี่ยนแปลงก่อน-หลังเล่นเกม</div><div class="compare-grid"><div class="compare-box pre"><div class="cblabel">ก่อนเล่นเกม</div><div class="compare-bar-wrap">'+preRows+'</div></div><div class="compare-box post"><div class="cblabel">หลังเล่นเกม</div><div class="compare-bar-wrap">'+postRows+'</div></div></div>';
}

/* ===================== GAS SUBMIT ===================== */
async function submitToGAS(){
  if(GAS_URL==="YOUR_GAS_URL_HERE"){
    document.getElementById('gasStatus').textContent='⚠ ครูยังไม่ได้ตั้งค่า URL สำหรับรับข้อมูล';
    return;
  }
  var name=document.getElementById('gasName').value.trim()||'ไม่ระบุ';
  var cls=document.getElementById('gasClass').value.trim()||'ไม่ระบุ';
  var key=computeEnding();
  var payload={
    timestamp:new Date().toISOString(),
    name, class:cls,
    result:endings[key].title,
    scores:JSON.stringify(scores),
    path:path.map(p=>p.choiceLabel).join(' | '),
    pre:preScores?JSON.stringify(preScores):'',
    post:postScores?JSON.stringify(postScores):''
  };
  var statusEl=document.getElementById('gasStatus');
  statusEl.textContent='กำลังส่ง...';
  try{
    var fd=new FormData();
    Object.entries(payload).forEach(([k,v])=>fd.append(k,v));
    await fetch(GAS_URL,{method:'POST',body:fd,mode:'no-cors'});
    statusEl.textContent='✓ ส่งผลเรียบร้อยแล้ว ขอบคุณที่เข้าร่วม!';
    statusEl.style.color='var(--teal)';
    document.getElementById('gasForm').style.opacity='0.6';
  }catch(e){
    statusEl.textContent='✗ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
    statusEl.style.color='#B5502E';
  }
}

    }
  } else {
    prePostHTML='<div style="font-size:9pt;color:#AAA;">ไม่มีข้อมูลแบบสำรวจ</div>';
  }

  // Next steps
  var nsHTML = '';
  result.nextsteps.forEach(function(ns){
    nsHTML += '<div style="display:flex;gap:8px;margin-bottom:8px;"><div style="font-size:13pt;flex-shrink:0;">'+ns.icon+'</div><div><div style="font-size:9.5pt;font-weight:600;color:#1B3328;margin-bottom:2px;">'+ns.title+'</div><div style="font-size:9pt;color:#555;line-height:1.6;">'+ns.desc+'</div></div></div>';
  });

  // Careers
  var careersHTML = '';
  result.careers.forEach(function(c){
    careersHTML += '<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:7px;"><span style="color:#6FA98C;flex-shrink:0;">&#9670;</span><span style="font-size:9.5pt;color:#1B3328;line-height:1.55;">'+c+'</span></div>';
  });

  function sec(txt){ return '<div style="font-size:7.5pt;letter-spacing:0.16em;text-transform:uppercase;color:#6FA98C;font-weight:600;border-bottom:1.5px solid #C8E6D4;padding-bottom:4px;margin:18px 0 11px;">'+txt+'</div>'; }

  // Build full HTML string
  var H = '';
  H += '<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">';
  H += '<title>เส้นทางที่เลือกเอง — ผลการเดินทาง</title>';
  H += '<link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">';
  H += '<style>';
  H += '*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}';
  H += 'html,body{margin:0;padding:0;background:#E8E4DC;font-family:\'Mitr\',sans-serif;}';
  H += 'h1,h2,h3{font-family:\'Taviraj\',serif;margin:0;}';
  H += '@media screen{body{padding:16px 0 40px;}.page{width:210mm;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,0.18);}.pbar{width:210mm;margin:0 auto 12px;display:flex;gap:10px;justify-content:flex-end;}.pb{background:#1B3328;color:#EFE9DD;border:none;border-radius:8px;padding:9px 20px;font-family:\'Mitr\',sans-serif;font-size:13px;cursor:pointer;}.pb:hover{background:#2E7D56;}.cb{background:transparent;color:#888;border:1px solid #CCC;border-radius:8px;padding:9px 16px;font-family:\'Mitr\',sans-serif;font-size:13px;cursor:pointer;}}';
  H += '@media print{html,body{background:#fff!important;padding:0!important;}.page{width:100%!important;box-shadow:none!important;}.pbar{display:none!important;}}';
  H += '.page{background:#fff;min-height:297mm;display:flex;flex-direction:column;}';
  H += '.hd{background:linear-gradient(135deg,#0C1C12,#1B3328 50%,#255040);padding:26px 36px 22px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;position:relative;overflow:hidden;flex-shrink:0;}';
  H += '.hd::before{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;border:44px solid rgba(212,162,76,.10);}';
  H += '.hd-k{font-size:7.5pt;letter-spacing:.22em;text-transform:uppercase;color:#EACB8B;margin-bottom:5px;}';
  H += '.hd-t{font-family:\'Taviraj\',serif;font-size:19pt;font-weight:700;color:#EFE9DD;line-height:1.2;margin-bottom:5px;}';
  H += '.hd-s{font-size:8.5pt;color:rgba(239,233,221,.55);line-height:1.5;}';
  H += '.hd-r{text-align:right;flex-shrink:0;position:relative;z-index:1;}';
  H += '.pill{display:inline-block;background:rgba(212,162,76,.18);border:1px solid rgba(212,162,76,.45);color:#EACB8B;border-radius:100px;font-size:7.5pt;padding:3px 11px;letter-spacing:.08em;margin-bottom:7px;}';
  H += '.rt{font-family:\'Taviraj\',serif;font-size:13.5pt;font-weight:600;color:#EFE9DD;line-height:1.3;max-width:155px;margin-left:auto;}';
  H += '.rtag{font-size:7.5pt;color:rgba(239,233,221,.5);margin-top:4px;}';
  H += '.body{display:grid;grid-template-columns:1fr 68mm;flex:1;}';
  H += '.main{padding:22px 22px 22px 36px;}';
  H += '.side{padding:22px 28px 22px 18px;background:#F5FAF7;border-left:1px solid #D8EDE4;}';
  H += '.desc{font-size:10pt;color:#2D2D2D;line-height:1.85;margin-bottom:8px;}';
  H += '.wo{background:#FFFAF0;border-left:3px solid #D4A24C;border-radius:0 8px 8px 0;padding:9px 13px;}';
  H += '.wl{font-size:7.5pt;color:#A07010;font-weight:600;margin-bottom:2px;}';
  H += '.wt{font-size:9.5pt;color:#5C3A00;line-height:1.7;}';
  H += '.ch{background:#F0FBF5;border:1px solid #C0E4D0;border-radius:8px;padding:10px 13px;font-size:9.5pt;color:#1B4A2A;line-height:1.7;font-style:italic;}';
  H += '.ft{border-top:1px solid #E4E4E4;padding:9px 36px;display:flex;justify-content:space-between;align-items:center;background:#F9F9F7;flex-shrink:0;}';
  H += '.fn{font-size:7.5pt;color:#AAA;line-height:1.55;}';
  H += '.fd{font-size:7.5pt;color:#BBB;text-align:right;}';
  H += '</style></head><body>';
  H += '<div class="pbar"><button class="cb" onclick="window.close()">&#x2715; ปิด</button><button class="pb" onclick="window.print()">&#128438; พิมพ์ / บันทึก PDF</button></div>';
  H += '<div class="page">';

  // Header
  H += '<div class="hd"><div><div class="hd-k">ผลการเดินทาง &middot; เส้นทางที่เลือกเอง &middot; ม.6</div>';
  H += '<div class="hd-t">รายงานผลการสำรวจ<br>เส้นทางชีวิต</div>';
  H += '<div class="hd-s">โรงเรียนพูลเจริญวิทยาคม &middot; งานแนะแนว</div></div>';
  H += '<div class="hd-r"><div class="pill">ผลลัพธ์ของคุณ</div><div class="rt">'+result.title+'</div><div class="rtag">'+result.tagline+'</div></div></div>';

  // Body
  H += '<div class="body"><div class="main">';
  H += sec('ภาพรวมของเส้นทางคุณ');
  result.desc.forEach(function(d){ H += '<p class="desc">'+d+'</p>'; });
  H += sec('แนวโน้มในแต่ละด้าน');
  H += traitBarsHTML;
  H += sec('สิ่งที่ควรระวัง');
  H += '<div class="wo"><div class="wl">&#9888; จุดที่ต้องสังเกตตัวเอง</div><div class="wt">'+result.watchout+'</div></div>';
  H += sec('เส้นทางที่เดินผ่านมาทั้ง 8 จุด');
  H += pathHTML;
  H += '</div><div class="side">';
  H += sec('อาชีพที่ไปด้วยกันได้ดี');
  H += careersHTML;
  H += sec('ขั้นต่อไปที่แนะนำ');
  H += nsHTML;
  H += sec('คำถามท้าทายตัวเอง');
  H += '<div class="ch">"'+result.challenge+'"</div>';
  H += sec('ผลแบบสำรวจก่อน &#x2192; หลัง');
  H += '<div style="font-size:7.5pt;color:#AAA;margin-bottom:7px;">คะแนน 1-5 ต่อข้อ</div>';
  H += prePostHTML;
  H += '</div></div>';

  // Footer
  H += '<div class="ft"><div class="fn">ผลลัพธ์ใช้ประกอบการพูดคุยกับครูแนะแนวเท่านั้น<br>ไม่ใช่คำตัดสินสุดท้าย</div><div class="fd">พิมพ์วันที่<br>'+today+'</div></div>';
  H += '</div></body></html>';

  var win = window.open('','_blank','width=960,height=860,scrollbars=yes');
  win.document.write(H);
  win.document.close();
}


/* ===================== RESTART ===================== */
function restart(){
  scores={s:0,a:0,c:0,h:0};
  path=[];
  preScores=null;
  postScores=null;
  document.getElementById('progressWrap').style.display='none';
  transitionTo(renderIntro);
}

/* ===================== INIT ===================== */
renderIntro();
</script>
